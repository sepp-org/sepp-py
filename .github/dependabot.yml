version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      grpc:
        patterns:
          - "grpcio*"
          - "protobuf*"
      opentelemetry:
        patterns:
          - "opentelemetry*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
