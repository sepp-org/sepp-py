syntax = "proto3";

package sepp.v1;

import "google/protobuf/empty.proto";

// NOTE ON PROVENANCE
// ------------------
// This is the sepp wire contract, vendored for code generation. It is NOT the
// source of truth: the contract lives in the sepp `proto` repo and is published
// to buf.build/sepp-org/sepp-proto.
//
// The canonical proto carries `buf.validate` field/oneof annotations that
// describe *server-side* validation constraints (e.g. min_len, uuid, ranges).
// The client never enforces them — validation is the server's job — so they are
// stripped here. Dropping them lets protoc generate a self-contained module that
// depends only on the well-known types, with no `buf/validate` dependency. The
// wire format is unaffected: proto options never change field numbers, types, or
// encoding. To refresh this snapshot, re-export the canonical proto and strip
// the `import "buf/validate/validate.proto";` line plus every `[(buf.validate
// .*)]` field option and `option (buf.validate.oneof).required` line.

// ============================================================================
// Service definitions
// ============================================================================

service QueueService {
  // Best-effort batch enqueue. Accepts multiple jobs in one request and
  // returns an individual success or rejection per job. Use this for
  // fan-out batches of independent jobs where partial success is fine.
  //
  // Whole-batch failures use gRPC status codes:
  //   INVALID_ARGUMENT  - batch shape is malformed (empty, exceeds max_enqueue_batch)
  //   UNAUTHENTICATED   - missing or invalid API key
  //   INTERNAL          - server-side storage failure (transient; safe to retry)
  rpc EnqueueBatch(EnqueueBatchRequest) returns (EnqueueBatchResponse);

  // Atomic batch enqueue. Either every job is enqueued or none are.
  //
  // Use this when the jobs are coordinated steps and partial success would
  // leave the system in an inconsistent state.
  //
  // gRPC status codes:
  //   INVALID_ARGUMENT  - batch shape is malformed (empty, exceeds max_enqueue_batch)
  //   UNAUTHENTICATED   - missing or invalid API key
  //   INTERNAL          - server-side storage failure (transient; safe to retry)
  rpc EnqueueAtomic(EnqueueBatchRequest) returns (EnqueueAtomicResponse);

  // Long-poll reserve. Returns zero or more jobs, or times out with an empty list.
  //
  // gRPC status codes:
  //   INVALID_ARGUMENT     - request shape is malformed
  //   FAILED_PRECONDITION  - server is in strict mode and one or more requested
  //                          queues are not declared
  //   UNAUTHENTICATED      - missing or invalid API key
  //   INTERNAL             - server-side storage failure
  rpc Reserve(ReserveRequest) returns (ReserveResponse);

  // Acknowledge successful completion of a job.
  //
  // gRPC status codes:
  //   INVALID_ARGUMENT     - request shape is malformed
  //   NOT_FOUND            - no in-flight job with this id (already acked,
  //                          lease expired and was reassigned, or never existed)
  //   FAILED_PRECONDITION  - the attempt number does not match the current
  //                          in-flight attempt (lease was reassigned)
  //   UNAUTHENTICATED      - missing or invalid API key
  //   INTERNAL             - server-side storage failure
  rpc Ack(AckRequest) returns (AckResponse);

  // Negative-acknowledge with retry directive. Same status codes as Ack.
  rpc Nack(NackRequest) returns (NackResponse);

  // Extend the lease on an in-flight job. Same status codes as Ack.
  rpc Extend(ExtendRequest) returns (ExtendResponse);

  // Get server info and capabilities. INTERNAL on storage failure; otherwise infallible.
  rpc GetServerInfo(GetServerInfoRequest) returns (GetServerInfoResponse);
}

// ============================================================================
// Common types
// ============================================================================

// A JSON-primitive value, for use in the custom value map.
message PrimitiveValue {
  oneof value {
    string string_value = 1;
    double double_value = 2;
    int64 int_value = 3;
    bool bool_value = 4;
  }
}

// Trace context for distributed tracing.
message TraceContext {
  // W3C traceparent header value.
  string traceparent = 1;

  // W3C tracestate header value (vendor-specific trace info).
  optional string tracestate = 2;
}

// Carries payload bytes and the encoding hint.
message Payload {
  bytes data = 1;
  string encoding = 2;
}

// A job ready for a worker to process. Returned by Reserve.
message Job {
  // Server-assigned job ID (UUID).
  string id = 1;

  // Type tag the producer set when enqueueing.
  string job_type = 2;

  // Opaque payload with encoding hint for the worker.
  optional Payload payload = 3;

  // Producer-set priority. 0 is lowest, 9 is highest.
  uint32 priority = 4;

  // Trace context for tracing continuation.
  optional TraceContext trace_context = 5;

  // Wall-clock time when the producer enqueued this job. Milliseconds
  // since Unix epoch UTC.
  int64 enqueued_at = 6;

  // Which attempt at this job this delivery pertains to. 1 on first delivery, incremented on each redelivery.
  uint32 attempt = 7;

  // How many attempts are allowed before this job goes to dead-letter.
  uint32 max_attempts = 8;

  // Wall-clock time when the lease on this job expires. Milliseconds since Unix epoch UTC.
  // If the worker has not acked/nacked/extended by this time, the job becomes available for redelivery.
  int64 lease_expires_at = 9;

  // Custom key-value pairs.
  map<string, PrimitiveValue> custom = 10;

  // Schedule for future execution. If unset, the job is available immediately.
  optional int64 scheduled_at = 11;
}

// Reason a single job in an enqueue batch was rejected. Every variant
// represents a deterministic rejection: retrying the same job against the
// same server state produces the same outcome. Transient failures (e.g.
// storage outage) are reported as a whole-batch gRPC error, never as a
// JobRejection.
message JobRejection {
  oneof reason {
    // Strict mode is on and the target queue is not declared.
    UnknownQueue unknown_queue = 1;

    // payload.data exceeds the queue's max_payload_bytes.
    PayloadTooLarge payload_too_large = 2;

    // The queue restricts encodings and payload.encoding is not allowed.
    EncodingNotAllowed encoding_not_allowed = 3;

    // The queue restricts job_types and the requested job_type is not allowed.
    JobTypeNotAllowed job_type_not_allowed = 4;

    // The custom map has more entries than the queue allows.
    CustomEntriesTooMany custom_entries_too_many = 5;

    // Aggregate bytes of the custom map exceed the queue limit.
    CustomMapTooLarge custom_map_too_large = 6;

    // A key in the custom map exceeds max_custom_key_bytes.
    CustomKeyTooLong custom_key_too_long = 7;

    // queue name exceeds max_queue_name_bytes.
    QueueNameTooLong queue_name_too_long = 8;

    // job_type exceeds max_job_type_bytes.
    JobTypeNameTooLong job_type_name_too_long = 9;

    // idempotency_key exceeds max_idempotency_key_bytes.
    IdempotencyKeyTooLong idempotency_key_too_long = 10;

    // scheduled_at is further out than max_schedule_horizon_ms.
    ScheduledTooFar scheduled_too_far = 11;

    // Structural validation failed (e.g. required field missing).
    InvalidRequest invalid_request = 12;
  }
}

message UnknownQueue {
  string queue = 1;
}

message PayloadTooLarge {
  uint64 limit = 1;
  uint64 actual = 2;
}

message EncodingNotAllowed {
  string encoding = 1;
  repeated string allowed = 2;
}

message JobTypeNotAllowed {
  string job_type = 1;
  repeated string allowed = 2;
}

message CustomEntriesTooMany {
  uint32 limit = 1;
  uint32 actual = 2;
}

message CustomMapTooLarge {
  uint64 limit = 1;
  uint64 actual = 2;
}

message CustomKeyTooLong {
  string key = 1;
  uint32 limit = 2;
  uint64 actual = 3;
}

message QueueNameTooLong {
  uint32 limit = 1;
  uint64 actual = 2;
}

message JobTypeNameTooLong {
  uint32 limit = 1;
  uint64 actual = 2;
}

message IdempotencyKeyTooLong {
  uint32 limit = 1;
  uint64 actual = 2;
}

message ScheduledTooFar {
  uint64 horizon_ms = 1;
  int64 actual_ms = 2;
}

message InvalidRequest {
  string message = 1;
}

// ============================================================================
// Enqueue
// ============================================================================

// Enqueue a job for processing.
message EnqueueRequest {
  // Target queue.
  string queue = 1;

  // Type tag for worker-side dispatch.
  string job_type = 2;

  // Opaque payload with encoding hint for the worker.
  optional Payload payload = 3;

  // Deduplication key. The server rejects duplicate enqueues
  // with the same key within the queue's dedup window.
  optional string idempotency_key = 4;

  // Priority override. If unset, the queue default is used.
  // Range: 0-9. Higher priorities dequeue first.
  optional uint32 priority = 5;

  // Max attempts override. If unset, the queue default is used.
  optional uint32 max_attempts = 6;

  // Trace context from the producer.
  optional TraceContext trace_context = 7;

  // Custom key-value pairs.
  map<string, PrimitiveValue> custom = 8;

  // Schedule for future execution. If unset, the job is available immediately.
  optional int64 scheduled_at = 9;
}

// Response for an EnqueueRequest. Contains the assigned job ID and whether this was a duplicate.
// Mostly useful for logging on the producer side.
message EnqueueResponse {
  // Server-assigned job ID (UUID).
  string job_id = 1;

  // True if this enqueue was deduplicated (job_id refers to the existing job).
  bool deduplicated = 2;
}

// Batch enqueue request and response.
message EnqueueBatchRequest {
  // Jobs to enqueue.
  repeated EnqueueRequest jobs = 1;
}

// Response for an EnqueueBatchRequest. One result per request job, same order.
message EnqueueBatchResponse {
  repeated JobResult results = 1;
}

// Outcome of a single job in the batch.
message JobResult {
  oneof outcome {
    // The job was enqueued.
    EnqueueResponse success = 1;

    // The job was rejected. See JobRejection for the catalogue of reasons.
    JobRejection rejection = 2;
  }
}

// Response for EnqueueAtomic.
message EnqueueAtomicResponse {
  oneof outcome {
    // All jobs validated and were enqueued atomically.
    EnqueueAtomicSuccess success = 1;

    // At least one job failed validation; nothing was enqueued.
    BatchValidationFailure rejection = 2;
  }
}

message EnqueueAtomicSuccess {
  // One response per request job, same order.
  repeated EnqueueResponse responses = 1;
}

// The validation-failure branch of EnqueueAtomicResponse. Lists every job
// that failed pre-flight validation.
message BatchValidationFailure {
  repeated JobValidationError errors = 1;
}

message JobValidationError {
  // Position of the offending job in the original request batch.
  uint32 index = 1;

  // Why this job was rejected.
  JobRejection rejection = 2;
}

// ============================================================================
// Reserve (unary)
// ============================================================================

// Worker requests one or more jobs in a long-polling manner.
message ReserveRequest {
  // Queues to pull from. Worker is willing to process jobs from any of these.
  // Queue at index 0 is polled first, then index 1, etc.
  repeated string queues = 1;

  // How long the worker is willing to wait for a job, in milliseconds.
  // If no job is available within this window, the response has no jobs.
  // The server clamps this to its configured max (max_wait_timeout_ms,
  // advertised in GetServerInfo); a larger value is not an error.
  uint64 wait_timeout_ms = 2;

  // Lease duration the worker wants. Server may clamp to its configured max
  // (max_lease_duration_ms, advertised in GetServerInfo). The worker must ack,
  // nack, or extend before this time elapses, or the job will be redelivered.
  uint64 lease_duration_ms = 3;

  // A stable worker identifier, useful for observability and
  // sticky-routing future features.
  optional string worker_id = 4;

  // Maximum number of jobs to return in one response. Defaults to 1 if unset.
  // The server clamps this to its configured max (max_reserve_batch, advertised
  // in GetServerInfo); a larger value is not an error.
  optional uint32 max_jobs = 5;
}

// Zero or more jobs, up to the effective max_jobs. Empty when the wait timeout
// fires with no job available.
message ReserveResponse {
  repeated Job jobs = 1;
}

// ============================================================================
// Ack / Nack / Extend
// ============================================================================

message AckRequest {
  string job_id = 1;

  // The attempt for which this ack applies. Used to prevent acking a job that has been redelivered.
  uint32 attempt = 2;

  // Worker identifier for observability.
  optional string worker_id = 3;
}

message AckResponse {
  string job_id = 1;
}

message NackRequest {
  string job_id = 1;

  // The attempt for which this nack applies. Used to prevent nacking a job that has been redelivered.
  uint32 attempt = 2;

  // Human-readable reason, captured for debugging and metrics.
  optional string reason = 3;

  // Explicit retry behavior.
  optional NackRetry retry = 4;

  // Worker identifier for observability.
  optional string worker_id = 5;
}

message NackRetry {
  oneof strategy {
    // Use the queue's default retry policy.
    google.protobuf.Empty default = 1;

    // Retry after this many milliseconds.
    uint64 delay_ms = 2;

    // Don't retry; move directly to dead-letter.
    google.protobuf.Empty dead_letter = 3;
  }
}

message NackResponse {
  string job_id = 1;

  // True if this nack moved the job to dead-letter (e.g. max attempts reached).
  bool dead_lettered = 2;
}

message ExtendRequest {
  string job_id = 1;

  // The attempt for which this extend applies. Used to prevent extending a job that has been redelivered.
  uint32 attempt = 2;

  // How much longer to extend the lease, in milliseconds, measured from now.
  uint64 lease_duration_ms = 3;

  // Worker identifier for observability.
  optional string worker_id = 4;
}

message ExtendResponse {
  string job_id = 1;

  // New lease expiration. Milliseconds since Unix epoch UTC.
  int64 lease_expires_at = 2;
}

// ============================================================================
// Server info
// ============================================================================

message GetServerInfoRequest {}

message GetServerInfoResponse {
  // Server version (semver string).
  string server_version = 1;

  // Protocol versions supported by this server.
  repeated string supported_protocol_versions = 2;

  // Server-side time, milliseconds since Unix epoch UTC. Useful for clients
  // to detect clock skew.
  int64 server_time_ms = 3;

  // If true, the server will reject all encodings not explicitly listed in allowed_encodings.
  // If false, the server accepts all encodings, regardless of allowed_encodings.
  bool restricts_encodings = 4;
  repeated string allowed_encodings = 5;
  uint64 max_payload_bytes = 6;
  uint32 max_custom_entries = 7;
  uint64 max_custom_total_bytes = 8;
  uint32 max_custom_key_bytes = 9;

  // The limits below let clients validate locally before sending and avoid the
  // corresponding deterministic JobRejection. They reflect the server's default
  // (unscoped) limits; a specific queue MAY have stricter or laxer limits configured.

  // Max bytes in a queue name (-> QueueNameTooLong).
  uint32 max_queue_name_bytes = 10;

  // Max bytes in a job_type (-> JobTypeNameTooLong).
  uint32 max_job_type_bytes = 11;

  // Max bytes in an idempotency_key (-> IdempotencyKeyTooLong).
  uint32 max_idempotency_key_bytes = 12;

  // How far ahead scheduled_at may be set, in milliseconds (-> ScheduledTooFar).
  uint64 max_schedule_horizon_ms = 13;

  // Max jobs accepted in a single EnqueueBatch/EnqueueAtomic request. Batches
  // larger than this fail the whole request with INVALID_ARGUMENT.
  uint32 max_enqueue_batch = 14;

  // Reserve tuning hints. The server clamps Reserve requests to these maxima
  // rather than rejecting them; clients can use these to size requests well.

  // Max jobs returned by a single Reserve (clamps ReserveRequest.max_jobs).
  uint32 max_reserve_batch = 15;

  // Max queues a single Reserve may list (exceeding this is INVALID_ARGUMENT).
  uint32 max_reserve_queues = 16;

  // Max long-poll wait, in milliseconds (clamps ReserveRequest.wait_timeout_ms).
  uint64 max_wait_timeout_ms = 17;

  // Max lease duration, in milliseconds (clamps ReserveRequest.lease_duration_ms).
  uint64 max_lease_duration_ms = 18;

  // If true, the server is in strict mode: enqueueing to an undeclared queue is
  // rejected with UnknownQueue. If false, queues are created on demand.
  bool strict_queues = 19;
}
